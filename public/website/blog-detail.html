/* ════════════════════════════════════════════════════════
   DESIGN SYSTEM — KADR BRAND PALETTE
   Logo analysis: Deep brown · Mid brown · Amber · Cream
════════════════════════════════════════════════════════ */
:root{
  /* PRIMARY — Brown family (from logo) */
  --b900:#1A0A00;
  --b800:#2C1205;
  --b700:#4A2010;
  --b600:#6B3218;
  --b500:#8C4820;  /* Primary brand */
  --b400:#B46028;
  --b300:#D48040;
  --b200:#E8B888;
  --b150:#F2D4B4;
  --b100:#F8EAD8;
  --b50:#FDF5EC;

  /* SECONDARY — Sage (complementary warmth) */
  --s700:#1A4A3E;
  --s600:#226054;
  --s500:#2D7A6A;  /* Secondary brand */
  --s400:#3A9A86;
  --s300:#68BFB0;
  --s200:#A8DDD6;
  --s100:#D8F0EC;
  --s50:#EFF8F6;

  /* TERTIARY — Gold (accent, from amber logo highlights) */
  --g600:#8A6810;
  --g500:#B48A20;  /* Tertiary brand */
  --g400:#D4A830;
  --g300:#E8C860;
  --g100:#FBF0C0;
  --g50:#FDFAEC;

  /* NEUTRALS */
  --cream:#FAF0E0;  /* Site background */
  --warm-white:#FFFCF5;
  --text-primary:#1A0A00;
  --text-body:#3D2010;
  --text-muted:#7A5A40;
  --text-light:#B09070;
  --border:#E8D4C0;
  --border-light:#F2E8DA;

  /* SEMANTIC */
  --success:#2D7A4A;
  --warning:#B48A20;
  --error:#C03020;

  /* TYPOGRAPHY */
  --font-display:'Playfair Display',Georgia,serif;
  --font-serif:'DM Serif Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;

  /* SHADOWS */
  --shadow-sm:0 1px 4px rgba(42,16,0,.06),0 1px 2px rgba(42,16,0,.04);
  --shadow-md:0 4px 16px rgba(42,16,0,.08),0 2px 6px rgba(42,16,0,.05);
  --shadow-lg:0 12px 40px rgba(42,16,0,.12),0 4px 12px rgba(42,16,0,.07);
  --shadow-xl:0 24px 64px rgba(42,16,0,.15),0 8px 24px rgba(42,16,0,.08);

  /* RADIUS */
  --r-sm:6px;--r-md:12px;--r-lg:16px;--r-xl:24px;--r-2xl:32px;

  /* SHELL */
  --topbar-h:52px;
  --sidebar-w:230px;
}

/* ── RESET ── */

html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:#14100A;color:#CCC4B8;font-size:14px}

/* ─ BUTTONS ─ */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;border-radius:var(--r-md);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:var(--font-body);transition:all .2s;white-space:nowrap;line-height:1}
.btn-primary{background:var(--b500);color:#fff}
.btn-primary:hover{background:var(--b600);box-shadow:0 4px 16px rgba(140,72,32,.35)}
.btn-secondary{background:var(--s500);color:#fff}
.btn-secondary:hover{background:var(--s600)}
.btn-outline-brown{background:transparent;border:1.5px solid var(--b400);color:var(--b600)}
.btn-outline-brown:hover{background:var(--b50);border-color:var(--b500)}
.btn-outline-white{background:transparent;border:1.5px solid rgba(255,255,255,.35);color:#fff}
.btn-outline-white:hover{background:rgba(255,255,255,.08)}
.btn-white{background:#fff;color:var(--b600)}
.btn-white:hover{background:var(--b50)}
.btn-ghost{background:transparent;border:1.5px solid var(--s400);color:var(--s500)}
.btn-gold{background:var(--g400);color:var(--b800)}
.btn-lg{padding:14px 32px;font-size:15px;border-radius:var(--r-lg)}
.btn-sm{padding:8px 16px;font-size:12px}
.btn-icon{width:38px;height:38px;padding:0;justify-content:center;border-radius:50%}

/* ─ TAGS ─ */
.tag{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tag-brown{background:var(--b100);color:var(--b700)}
.tag-sage{background:var(--s100);color:var(--s700)}
.tag-gold{background:var(--g100);color:var(--g700)}

html, body {
  overflow: auto !important;
  height: auto !important;
  background: #FAF0E0 !important;

<script>
const API_URL = '/api';

// Utility functions
function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
    return null;
}

function navigateTo(page) {
    window.location.href = page;
}

function goToLogin() {
    const adminUrl = localStorage.getItem('adminUrl') || '/admin';
    window.location.href = adminUrl;
}

function setLanguage(lang) {
    document.body.className = 'lang-' + lang;
    document.querySelectorAll('.lt-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    localStorage.setItem('language', lang);
}

// Load blog detail
async function loadBlogDetail() {
    const urlParams = new URLSearchParams(window.location.search);
    const blogId = urlParams.get('id');
    
    if (!blogId) {
        document.getElementById('blogContent').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--error)">Blog ID not found</div>';
        return;
    }
    
    try {
        const response = await fetch(`${API_URL}/getBlog?id=${blogId}`);
        const responseData = await response.json();
        
        if (responseData.success) {
            const blog = responseData.data.blog;
            document.getElementById('blogTitle').textContent = blog.title;
            document.getElementById('blogMeta').innerHTML = `
                By ${blog.author_name} · ${new Date(blog.created_at).toLocaleDateString()} · 
                ${blog.categories.map(cat => `<span class="tag tag-brown">${cat.name}</span>`).join(' ')}
                ${blog.tags.length > 0 ? ' · ' + blog.tags.map(tag => `<span class="tag tag-sage">${tag.name}</span>`).join(' ') : ''}
            `;
            document.getElementById('blogContent').innerHTML = blog.content;
        } else {
            document.getElementById('blogContent').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--error)">Blog not found</div>';
        }
    } catch (error) {
        console.error('Error loading blog:', error);
        document.getElementById('blogContent').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--error)">Error loading blog</div>';
    }
}

// Initialize on page load
window.addEventListener('DOMContentLoaded', function() {
    const savedLang = localStorage.getItem('language') || 'en';
    document.body.className = 'lang-' + savedLang;
    
    const token = getCookie('accessToken');
    if (token) {
        document.getElementById('loginBtn').textContent = 'My Account';
    }
    
    loadBlogDetail();
});
</script>
